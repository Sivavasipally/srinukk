<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="jarGlass" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7e8" stop-opacity="0.9"/>
      <stop offset="70%" stop-color="#f4e4c1" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4a76a" stop-opacity="0.2"/>
    </radialGradient>
    <linearGradient id="pickleContent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="50%" stop-color="#a01818"/>
      <stop offset="100%" stop-color="#6a0f0f"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#1b0f0a"/>
    </linearGradient>
    <filter id="softShadow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- warm background -->
  <rect width="400" height="400" fill="#fdf6e8"/>
  <circle cx="200" cy="200" r="160" fill="#fef0d4" opacity="0.6"/>

  <!-- shadow under jar -->
  <ellipse cx="200" cy="360" rx="90" ry="10" fill="#8a5a2b" opacity="0.25" filter="url(#softShadow)"/>

  <!-- jar body -->
  <path d="M 130 150 Q 130 130 140 125 L 260 125 Q 270 130 270 150 L 268 340 Q 268 355 255 355 L 145 355 Q 132 355 132 340 Z"
        fill="url(#pickleContent)" stroke="#5b1010" stroke-width="2"/>

  <!-- jar highlight (glass shine) -->
  <path d="M 140 150 Q 140 135 148 132 L 165 132 Q 160 140 158 155 L 155 335 Q 155 345 148 345 L 142 345 Q 138 340 138 330 Z"
        fill="url(#jarGlass)" opacity="0.5"/>

  <!-- jar lid -->
  <rect x="120" y="105" width="160" height="32" rx="4" fill="url(#lidGrad)"/>
  <rect x="120" y="105" width="160" height="8" rx="4" fill="#4a2f22"/>
  <rect x="120" y="130" width="160" height="3" fill="#0a0604"/>

  <!-- label -->
  <rect x="150" y="200" width="100" height="80" rx="4" fill="#fdf6e8" stroke="#5b1010" stroke-width="1.5"/>
  <rect x="150" y="200" width="100" height="20" fill="#c62828"/>
  <text x="200" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="#fdf6e8">ANU'S</text>
  <text x="200" y="245" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#5b1010">Homemade</text>
  <text x="200" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#5b1010">Pickle</text>
  <line x1="165" y1="270" x2="235" y2="270" stroke="#c62828" stroke-width="0.8"/>

  <!-- chilli decorations -->
  <g transform="translate(85,210) rotate(-25)">
    <path d="M 0 0 Q 5 -8 12 -6 Q 30 0 45 15 Q 38 20 25 18 Q 10 15 0 0 Z" fill="#c62828"/>
    <path d="M 0 0 Q -3 -5 -8 -6 L -6 -2 Q -3 0 0 0" fill="#2e7d32"/>
  </g>
  <g transform="translate(300,230) rotate(30)">
    <path d="M 0 0 Q 5 -8 12 -6 Q 30 0 45 15 Q 38 20 25 18 Q 10 15 0 0 Z" fill="#c62828"/>
    <path d="M 0 0 Q -3 -5 -8 -6 L -6 -2 Q -3 0 0 0" fill="#2e7d32"/>
  </g>

  <!-- mustard seeds scattered -->
  <circle cx="110" cy="340" r="3" fill="#d4a017"/>
  <circle cx="120" cy="348" r="2.5" fill="#b8891a"/>
  <circle cx="290" cy="345" r="3" fill="#d4a017"/>
  <circle cx="280" cy="352" r="2.5" fill="#b8891a"/>
  <circle cx="100" cy="350" r="2" fill="#d4a017"/>
</svg>
